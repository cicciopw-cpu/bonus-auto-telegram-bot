name: Check Bonus Auto Telegram

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bonus-auto-bot
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepara repository aggiornato
        run: |
          git config user.name "bonus-auto-bot"
          git config user.email "bonus-auto-bot@users.noreply.github.com"
          git pull --rebase origin main

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Controlla bonus
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Salva memoria controlli
        run: |
          git add state.json

          if git diff --cached --quiet; then
            echo "Nessuna modifica a state.json"
          else
            git commit -m "Aggiorna stato controlli"
            git push origin main
          fi
