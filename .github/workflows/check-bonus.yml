name: Check Bonus Auto Telegram

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica repository
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Controlla bonus
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Salva memoria controlli
        run: |
          git config user.name "bonus-auto-bot"
          git config user.email "bonus-auto-bot@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Aggiorna stato controlli"
          git push
